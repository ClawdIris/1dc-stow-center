er-bottom:1.5pt solid #000;\n  }\n  .lp-logo-img { height:0.32in; max-width:1.5in; object-fit:contain; }\n  .lp-co {\n    font-family:'Syne',Arial,sans-serif;\n    font-size:13pt;\n    font-weight:900;\n    letter-spacing:0.05em;\n    color:#000;\n    line-height:1;\n  }\n  .lp-tagline {\n    font-size:7pt;\n    font-weight:600;\n    text-transform:uppercase;\n    letter-spacing:0.09em;\n    color:#444;\n    text-align:right;\n  }\n\n  /* \u2500 TRACKING NUMBER \u2014 full-width oversized \u2500 */\n  .lp-tracking-box {\n    border-bottom:1.5pt solid #000;\n    text-align:center;\n    padding:0.06in 0.1in 0.04in;\n    line-height:1;\n  }\n  .lp-tracking-num {\n    font-family:'IBM Plex Mono',monospace;\n    font-size:17pt;\n    font-weight:800;\n    letter-spacing:1.5pt;\n    color:#000;\n    display:block;\n  }\n\n  /* \u2500 BOX COUNTER \u2500 */\n  .lp-counter {\n    text-align:center;\n    font-size:10pt;\n    font-weight:700;\n    color:#000;\n    padding:0.04in 0;\n    border-bottom:1.5pt solid #000;\n    letter-spacing:1pt;\n  }\n\n  /* \u2500 FROM / TO blocks \u2500 */\n  .lp-addr-row {\n    display:flex;\n    border-bottom:1pt solid #000;\n  }\n  .lp-from-col {\n    flex:1;\n    padding:0.07in 0.12in;\n    border-right:1pt solid #000;\n  }\n  .lp-to-col {\n    flex:1.1;\n    padding:0.07in 0.12in;\n  }\n  .lp-addr-lbl {\n    font-size:6pt;\n    font-weight:700;\n    text-transform:uppercase;\n    letter-spacing:0.1em;\n    color:#666;\n    margin-bottom:2pt;\n  }\n  .lp-addr-name {\n    font-size:10.5pt;\n    font-weight:700;\n    color:#000;\n    line-height:1.2;\n  }\n  .lp-addr-line {\n    font-size:8pt;\n    color:#222;\n    line-height:1.4;\n    margin-top:1pt;\n  }\n\n  /* \u2500 ZONE STRIPE \u2014 full-width solid color \u2500 */\n  .lp-zone-stripe {\n    height:0.22in;\n    width:100%;\n    display:flex;\n    align-items:center;\n    justify-content:center;\n    /* color set inline */\n  }\n  .lp-zone-label {\n    color:#fff;\n    font-weight:800;\n    font-size:7pt;\n    letter-spacing:1.5pt;\n    text-transform:uppercase;\n    text-shadow:0 1px 2px rgba(0,0,0,.4);\n  }\n\n  /* \u2500 OFFICE / DATE row \u2500 */\n  .lp-office-row {\n    display:flex;\n    justify-content:space-between;\n    align-items:center;\n    padding:0.04in 0.13in;\n    border-top:1pt solid #ddd;\n    border-bottom:1pt solid #000;\n    font-size:7.5pt;\n    color:#222;\n  }\n\n  /* \u2500 BARCODE section \u2500 */\n  .lp-barcode-wrap {\n    flex:1;\n    display:flex;\n    flex-direction:column;\n    align-items:center;\n    justify-content:center;\n    padding:0.08in 0.1in 0.05in;\n  }\n  .lp-barcode-id {\n    font-family:'IBM Plex Mono',monospace;\n    font-size:8pt;\n    letter-spacing:2pt;\n    color:#333;\n    margin-top:3pt;\n    text-align:center;\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     RECEIPT \u2014 8.5\xD711, all 3 copies\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  .receipt-printout {\n    position:fixed !important;\n    top:0; left:0; right:0; bottom:0;\n    padding:0.3in;\n    background:#fff !important;\n    font-family:'IBM Plex Sans',Arial,sans-serif;\n    color:#000 !important;\n    display:none;\n    box-sizing:border-box;\n  }\n  .rp-copies {\n    display:grid;\n    grid-template-columns:1fr 1fr 1fr;\n    gap:0.15in;\n    height:100%;\n  }\n  .rp-copy {\n    border:1.5pt solid #999;\n    border-radius:5pt;\n    padding:0.15in 0.12in;\n    position:relative;\n    overflow:hidden;\n    display:flex;\n    flex-direction:column;\n  }\n  .rp-copy.white  { border-color:#999;  background:#fff; }\n  .rp-copy.pink   { border-color:#F8 :0;right:0;z-index:200;background:var(--bg2);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0px)}\n.mob-nav-row{display:flex;height:60px;align-items:stretch}\n.mob-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:transparent;cursor:pointer;color:var(--text4);font-size:9.5px;font-weight:700;font-family:'IBM Plex Sans',sans-serif;letter-spacing:.02em;transition:.12s;-webkit-tap-highlight-color:transparent}\n.mob-tab .ti{font-size:21px;line-height:1.1}\n.mob-tab.on{color:var(--amber)}\n.mob-tab.on .ti{transform:scale(1.1)}\n\n/* \u2500\u2500 \"More\" bottom sheet \u2500\u2500 */\n.mob-sheet-wrap{position:fixed;inset:0;z-index:300}\n.mob-sheet-bd{position:absolute;inset:0;background:rgba(0,0,0,.6)}\n.mob-sheet{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:20px 20px 0 0;padding:14px 16px calc(env(safe-area-inset-bottom,0px) + 24px);max-height:82vh;overflow-y:auto}\n.mob-sheet-grip{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}\n.mob-sheet-section{font-size:9.5px;font-weight:700;color:var(--text4);text-transform:uppercase;letter-spacing:.1em;margin:14px 0 8px}\n.mob-sheet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}\n.mob-sheet-btn{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:10.5px;font-weight:600;color:var(--text2);font-family:'IBM Plex Sans',sans-serif;text-align:center;transition:.12s;-webkit-tap-highlight-color:transparent}\n.mob-sheet-btn.on{border-color:var(--amber);color:var(--amber);background:var(--amberdim)}\n.mob-sheet-btn .si{font-size:22px}\n.mob-view-row{display:flex;gap:6px;margin-bottom:2px}\n.mob-view-btn{flex:1;padding:9px 4px;border-radius:9px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:11px;font-weight:700;font-family:'IBM Plex Sans',sans-serif;color:var(--text3);text-align:center;transition:.12s}\n\n/* \u2500\u2500 Responsive overrides \u2500\u2500 */\n@media(max-width:768px){\n  /* Layout */\n  .sidebar{display:none!important}\n  .topbar{display:none!important}\n  .mob-hdr{display:flex}\n  .mob-nav{display:block}\n  .page{padding:14px 12px 80px!important}\n\n  /* Grids collapse */\n  .sg4{grid-template-columns:1fr 1fr!important}\n  .sg3{grid-template-columns:1fr 1fr!important}\n  .sg2{grid-template-columns:1fr!important}\n  .fr{grid-template-columns:1fr!important}\n\n  /* Tables scroll */\n  .tbl{overflow-x:auto;-webkit-overflow-scrolling:touch}\n  table{min-width:540px}\n\n  /* Modals slide up from bottom */\n  .overlay{align-items:flex-end!important;padding:0!important}\n  .modal,.modal-lg{width:100%!important;max-width:100%!important;border-radius:20px 20px 0 0!important;max-height:91vh!important;padding:18px 16px!important}\n\n  /* Inputs: prevent iOS zoom */\n  .fi,input,select,textarea{font-size:16px!important}\n\n  /* Wrap button rows */\n  .row{flex-wrap:wrap}\n\n  /* Bigger tap targets */\n  .btn{min-height:36px}\n  .btn-sm{min-height:32px}\n\n  /* Toast above bottom nav */\n  .toast-mob{bottom:76px!important}\n\n  /* Card header wraps */\n  .card-hd{flex-wrap:wrap}\n\n  /* Hide desktop search in topbar */\n  .srch{display:none}\n\n  /* Role switcher hidden \u2014 handled by bottom sheet */\n  .role-sw{display:none}\n\n  /* Order action buttons stack */\n  .order-actions{flex-direction:column;align-items:stretch}\n  .order-actions .btn{justify-content:center}\n}\n\n@media(max-width:420px){\n  .sg4{grid-template-columns:1fr 1fr!important}\n  .mob-sheet-grid{grid-template-columns:repeat(2,1fr)}\n  .page{padding:10px 10px 80px!important}\n}\n.mix-bar-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid rgba(28,40,64,.6)}\n.mix-bar-row:last-child{border-bottom:none}\n.batch-card{background:linear-gradient(135deg,rgba(245,158,11,
